services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
    ports:
      - "${TRAEFIK_HTTP_PORT:-88}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  river-db-api:
    build:
      context: ../river-data-api
      dockerfile: Dockerfile.dev
    environment:
      # Database
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-psql}
      - DB_HOST=river-db-timescale
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-postgres}
      # Vaisala API
      - VAISALA_BASE_URL=${VAISALA_BASE_URL:-http://localhost:9999}
      - VAISALA_BEARER_TOKEN=${VAISALA_BEARER_TOKEN:-offline-dev-token}
      - VAISALA_SKIP_TLS_VERIFY=${VAISALA_SKIP_TLS_VERIFY:-true}
      - VAISALA_MAX_HISTORY_DAYS=${VAISALA_MAX_HISTORY_DAYS:-90}
      # Sync settings
      - SYNC_READINGS_INTERVAL_SECONDS=${SYNC_READINGS_INTERVAL_SECONDS:-3600}
      - SYNC_DEVICE_STATUS_INTERVAL_SECONDS=${SYNC_DEVICE_STATUS_INTERVAL_SECONDS:-3600}
      - SYNC_RETRY_MAX=${SYNC_RETRY_MAX:-3}
      - SYNC_RETRY_DELAY_SECONDS=${SYNC_RETRY_DELAY_SECONDS:-60}
      # API settings
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-3000}
      - API_DEFAULT_PAGE_SIZE=${API_DEFAULT_PAGE_SIZE:-1000}
      - API_MAX_PAGE_SIZE=${API_MAX_PAGE_SIZE:-10000}
      # Rate limiting
      - DISABLE_RATE_LIMITING=${DISABLE_RATE_LIMITING:-false}
      - RATE_LIMIT_METADATA_PER_SECOND=${RATE_LIMIT_METADATA_PER_SECOND:-1}
      - RATE_LIMIT_METADATA_BURST=${RATE_LIMIT_METADATA_BURST:-60}
      - RATE_LIMIT_DATA_PER_SECOND=${RATE_LIMIT_DATA_PER_SECOND:-10}
      - RATE_LIMIT_DATA_BURST=${RATE_LIMIT_DATA_BURST:-60}
      - BULK_CONCURRENT_LIMIT=${BULK_CONCURRENT_LIMIT:-5}
      # Caching
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - CACHE_MAX_BYTES=${CACHE_MAX_BYTES:-209715200}
      # Application
      - DEPLOYMENT=${DEPLOYMENT:-dev}
      - RUST_LOG=${RUST_LOG:-info,river_db=debug,sea_orm=warn,sqlx=warn}
      # Authentication (points to local Keycloak)
      - KEYCLOAK_URL=http://river-db-keycloak:8080/
      - KEYCLOAK_REALM=river-data
      - KEYCLOAK_CLIENT_ID=river-data-ui
      - REQUIRE_PARTNER_AUTH=${REQUIRE_PARTNER_AUTH:-false}
    ports:
      - "${API_EXTERNAL_PORT:-3005}:${API_PORT:-3000}"
    depends_on:
      river-db-timescale:
        condition: service_healthy
      river-db-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${API_PORT:-3000}/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ../river-data-api/src:/app/src
      - ../river-data-api/migration:/app/migration
      - ../river-data-api/Cargo.toml:/app/Cargo.toml
      - ../river-data-api/Cargo.lock:/app/Cargo.lock
      - ../river-data-api/bacon.toml:/app/bacon.toml
      - river-db-rust-data:/app/target
    labels:
      - "traefik.http.routers.river-db-api.rule=PathPrefix(`/api`) || PathPrefix(`/healthz`) || PathPrefix(`/docs`) || PathPrefix(`/dashboard`)"
      - "traefik.http.routers.river-db-api.priority=100"
      - "traefik.http.services.river-db-api.loadbalancer.server.port=${API_PORT:-3000}"

  river-db-timescale:
    image: timescale/timescaledb:${TIMESCALEDB_VERSION:-2.23.0-pg18}
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-psql}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5443}:5432"
    volumes:
      - river-db-timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  river-db-ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - VITE_KEYCLOAK_BROWSER_URL=http://localhost:8180/
    labels:
      - "traefik.http.routers.river-db-ui.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.river-db-ui.priority=50"
      - "traefik.http.services.river-db-ui.loadbalancer.server.port=5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts

  river-data-sync-vaisala:
    build:
      context: ../river-data-api
      dockerfile: river-data-sync-vaisala/Dockerfile
    environment:
      # River Data API connection
      - API_BASE_URL=http://river-db-api:${API_PORT:-3000}
      # Control plane credentials (create via dashboard → System → Services)
      - SERVICE_CLIENT_ID=${SERVICE_CLIENT_ID:-}
      - SERVICE_CLIENT_SECRET=${SERVICE_CLIENT_SECRET:-}
      - INSTANCE_ID=${INSTANCE_ID:-vaisala-dev-01}
      # Vaisala viewLinc connection
      - VAISALA_BASE_URL=${VAISALA_BASE_URL:-https://10.95.35.5/rest/v1}
      - VAISALA_BEARER_TOKEN=${VAISALA_BEARER_TOKEN:-}
      - VAISALA_SKIP_TLS_VERIFY=${VAISALA_SKIP_TLS_VERIFY:-true}
      # Runner config
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-300}
      - HEARTBEAT_INTERVAL_SECONDS=${HEARTBEAT_INTERVAL_SECONDS:-30}
      - MAX_HISTORY_DAYS=${MAX_HISTORY_DAYS:-90}
      # Retry configuration
      - RETRY_MAX=${RETRY_MAX:-3}
      - RETRY_DELAY_SECONDS=${RETRY_DELAY_SECONDS:-60}
      # Logging
      - RUST_LOG=${SYNC_RUST_LOG:-info}
    depends_on:
      river-db-api:
        condition: service_healthy

  river-db-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak-realm-dev.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  river-db-timescale-data:
  river-db-rust-data:
